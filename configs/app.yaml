# DrawFace Live — Phase 5 sprite fallback configuration.
# All thresholds live here (CLAUDE.md §7), not in code.

camera:
  index: 4          # RealSense 455 RGB node (see scripts/probe_camera.sh)
  width: 640
  height: 480

character:
  dir: assets/sprites/pig

tracker:
  model: checkpoints/mediapipe/face_landmarker.task

control:
  mirror: true      # true: user's LEFT eye drives the sprite on the VIEWER-LEFT (mirror-like)

# Live paths use the One Euro filter (speed-adaptive: smooth at rest, snappy on
# fast motion). The fixed alphas below remain for offline tools (sprite_video).
smoothing:
  min_cutoff: 1.2       # Hz — baseline smoothing for blendshape channels
  beta: 2.0             # speed coefficient — rest stays smooth, a blink gets a ~0.7 alpha
  head_min_cutoff: 1.0  # Hz — head yaw/pitch/roll (degrees scale)
  head_beta: 0.02
  blend_alpha: 0.45 # EMA for blendshape values (higher = snappier)
  blink_alpha: 0.70 # faster EMA for eyeBlink channels — blinks last only a few frames
  head_alpha: 0.30  # EMA for head pose

eyes:
  close_threshold: 0.38       # calibrated blink score >= this -> eye fully closes
  open_threshold: 0.25        # <= this -> leaves the closed state (hysteresis gap prevents flicker)
  half_close_threshold: 0.20  # >= this -> half-closed (sleepy) band
  half_open_threshold: 0.12   # <= this -> back to fully open

mouth:
  jaw_mid: 0.16          # jawOpen below -> I, above -> E
  jaw_large: 0.32        # jawOpen above -> A
  jaw_closed: 0.06       # jawOpen below -> closed (or smile)
  pucker_threshold: 0.40 # mouthPucker above -> U (O if jaw open)
  funnel_threshold: 0.35 # mouthFunnel above -> O
  smile_threshold: 0.30  # mouthSmile avg above (with closed jaw) -> smile mouth (mouth_smile.png, derived)

head:
  yaw_gain_px: -1.6   # px of x-shift per degree of yaw (sign flips direction)
  pitch_gain_px: 1.2  # px of y-shift per degree of pitch
  roll_gain: 1.0      # multiplier on roll degrees for canvas rotation
  max_shift_px: 48
  max_roll_deg: 20

lost_face:
  hold_ms: 300    # keep last expression this long after face is lost
  decay_ms: 600   # then ease back to neutral over this long

calibration:
  frames: 30      # neutral-pose frames captured at startup / on 'c' key

# ARAP warp mode (app.warp_live) — gain from calibrated blendshape to channel travel
warp:
  blink_gain: 2.0
  smile_gain: 2.0
  jaw_gain: 2.2   # 말하기 수준 벌림에도 반응 (웹 r7 튜닝 미러)
  head_parallax: 1.0  # mesh parallax strength on top of canvas shift (0 = off)

# Idle motion — keeps the character alive when the face is still or lost
idle:
  breath_period_s: 3.6  # breathing bob cycle
  breath_amp: 0.05      # pitch-channel amplitude
  blink_min_s: 4.0      # min gap since the last (real or idle) blink
  blink_max_s: 7.0
  blink_ms: 260         # scripted blink duration
