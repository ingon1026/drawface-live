<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>소년 미러링 — DrawFace Live</title>
<!-- talking-drawing-avatar 데모의 미러링 방법을 그대로 이식한 페이지: 같은 렌더 코어
     (avatar_core.js — 벡터 입·WebGL 얼굴 워핑·눈동자 시선·makeMirror)로 소년을 구동한다.
     drawface 스프라이트/워프 파이프라인과 완전 분리 — 저쪽 코드는 건드리지 않는다. -->
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif; background: #16161d; color: #e8e8ef;
  }
  main { width: min(560px, 94vw); padding: 24px 0 48px; }
  h1 { font-size: 1.2rem; font-weight: 600; margin: 16px 0; display: flex; justify-content: space-between; align-items: center; }
  h1 a { color: #9a9ab0; font-size: .85rem; text-decoration: none; }
  .stage { width: 100%; aspect-ratio: 1; background: #fff; border-radius: 16px; overflow: hidden; border: 1px solid #2a2a35; position: relative; }
  .warp-shake { position: absolute; inset: 0; will-change: transform; }
  .warp-shake canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #gl { z-index: 0; }
  #cv { z-index: 1; }
  .row { display: flex; gap: 8px; margin-top: 14px; align-items: center; flex-wrap: wrap; }
  button { padding: 10px 16px; border-radius: 10px; border: 0; background: #5b8cff; color: #fff; font-size: .95rem; cursor: pointer; }
  button.alt { background: #2a2a35; }
  #mirrorBtn.on { background: #5b8cff; }
  #status { margin-top: 12px; color: #9a9ab0; font-size: .9rem; min-height: 1.2em; }
  #status.error { color: #ff7a7a; }
</style>
</head>
<body>
<main>
  <h1>🪞 소년 미러링 <a href="./">← DrawFace Live</a></h1>

  <div class="stage"><div class="warp-shake" id="shake">
    <canvas id="gl" width="512" height="512"></canvas>
    <canvas id="cv" width="512" height="512"></canvas>
  </div></div>

  <div class="row">
    <button id="mirrorBtn">🪞 미러링 시작</button>
    <label style="font-size:.88rem"><input type="checkbox" id="warpToggle" checked> 얼굴 워핑</label>
  </div>

  <div id="status">캐릭터 로딩 중…</div>
</main>

<script src="avatar_core.js"></script>
<script>
const $ = id => document.getElementById(id);
const cv = $("cv"), ctx = cv.getContext("2d");
const glCanvas = $("gl"), shakeEl = $("shake"), warpToggle = $("warpToggle");
const setStatus = AvatarCore.bindStatus($("status"));

// ---------- 소년 파츠 로드 (talking-drawing-avatar 기본 캐릭터 원본 그대로) ----------
const PART_FILES = ["base", "brow_L", "brow_R", "eye_L_open", "eye_R_open",
  "eye_L_closed", "eye_R_closed", "pupil_L", "pupil_R"];
let parts = {}, manifest = null, smooth = {};
const W = k => smooth[k] || 0;

async function loadBoy() {
  manifest = await fetch("characters/boy/manifest.json").then(r => r.json());
  await Promise.all(PART_FILES.map(name => new Promise(res => {
    const img = new Image();
    img.onload = () => { parts[name] = img; res(); };
    img.onerror = () => res();
    img.src = `characters/boy/${name}.png`;
  })));
  warp.setCharacter();
  setStatus("🪞 미러링 시작을 누르고 카메라를 허용해주세요");
}

// ---------- 렌더 부품 (face 데모와 동일 코어) ----------
const cursor = AvatarCore.makeCursorTracker(document.querySelector(".stage"));
const gaze = AvatarCore.makeGaze(cursor, { mulX: 0.9, mulY: 0.6 });
const blinker = AvatarCore.makeBlink({ autoBlink: () => true, intervalMs: () => 4000, duration: 140, jitter: 0.6 });
const headWander = AvatarCore.makeHeadWander();
const warp = AvatarCore.makeWarp({
  threeUrl: "./vendor/three.module.js", glCanvas,
  getParts: () => parts, getManifest: () => manifest, W,
});
const mirror = AvatarCore.makeMirror({
  gain: { jawopen: 1.6, mouthsmileleft: 1.4, mouthsmileright: 1.4 },
  onStatus: setStatus,
});
$("mirrorBtn").onclick = () => {
  if (mirror.on) {
    mirror.stop(); $("mirrorBtn").classList.remove("on"); $("mirrorBtn").textContent = "🪞 미러링 시작";
    return;
  }
  mirror.start().then(() => { $("mirrorBtn").classList.add("on"); $("mirrorBtn").textContent = "⏹ 미러링 종료"; })
    .catch(e => { mirror.stop(); $("mirrorBtn").classList.remove("on"); setStatus("미러링 실패: " + e.message, true); });
};

// ---------- 렌더 루프 (face 데모 루프에서 발화·감정·녹화만 뺀 것) ----------
function render(now) {
  requestAnimationFrame(render);
  if (!parts.base || !manifest) return;

  AvatarCore.smoothStep(smooth, {});
  mirror.apply(smooth, now);   // 미러링 중이면 웹캠 표정 채널을 max-결합
  const blink = Math.max(blinker.value(now), W("eyeblinkleft"), W("eyeblinkright"));

  headWander(shakeEl, now, W("jawopen"), 0.5, null);   // 유휴 생동감(호흡·표류)

  const warpOn = warp.ready && warpToggle.checked;
  if (warpOn) { glCanvas.style.visibility = "visible"; warp.render(); }
  else { glCanvas.style.visibility = "hidden"; }

  ctx.clearRect(0, 0, 512, 512);
  const draw = (n, dyy = 0) => parts[n] && ctx.drawImage(parts[n], 0, dyy);
  const drawXY = (n, dx, dyy) => parts[n] && ctx.drawImage(parts[n], dx, dyy);
  if (!warpOn) { ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, 512, 512); draw("base"); }
  const browUp = -(manifest.browRange || 0) * Math.min(1, W("browinnerup") + (W("browouterupleft") + W("browouterupright")) / 2)
               + (manifest.browRange || 0) * 0.8 * (W("browdownleft") + W("browdownright")) / 2;
  draw("brow_L", browUp); draw("brow_R", browUp);
  if (blink > 0.5) { draw("eye_L_closed"); draw("eye_R_closed"); }
  else {
    draw("eye_L_open"); draw("eye_R_open");
    const [gzx, gzy] = gaze(0, W);   // 미러링 시선 채널 > 커서 > 유휴 saccade
    const pr = manifest.pupilRange || 0;
    drawXY("pupil_L", gzx * pr, gzy * pr); drawXY("pupil_R", gzx * pr, gzy * pr);
  }
  const jawDy = warp.jawOverlayDy(W("jawopen"), warpOn, manifest);
  AvatarCore.drawVectorMouth(ctx, W, manifest, jawDy);   // 그 자연스러운 벡터 입(오/우 둥근 O 포함)
}

warp.init();
loadBoy().catch(e => setStatus("캐릭터 로드 실패: " + e.message, true));
requestAnimationFrame(render);
</script>
</body>
</html>
