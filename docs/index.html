<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DrawFace Live — 표정 미러링</title>
<!-- 메인 = 미러링 스튜디오: 들어가자마자 시연. 캐릭터 선택(석고상 3D 기본 / 소년 2D),
     내 손그림은 draw.html(기존 앱 보존). mark 헤드는 NVIDIA Maya-ACE(MIT) 파생 —
     assets3d/LICENSE-mark.txt 고지 포함으로 재배포 조건 충족. -->
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif; background: #16161d; color: #e8e8ef;
  }
  main { width: min(900px, 96vw); padding: 24px 0 48px; }
  h1 { font-size: 1.25rem; font-weight: 700; margin: 12px 0; }
  .duo { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; align-items: flex-start; }
  .stage { flex: 1 1 380px; max-width: 560px; aspect-ratio: 1; border-radius: 16px; overflow: hidden; border: 1px solid #2a2a35; position: relative; }
  /* 분석 패널: 캐릭터 옆에서 내 얼굴 + MediaPipe 랜드마크 + 표정 채널값을 비교군으로 보여준다
     (내용물은 코어 AvatarCore.makeMirrorPanel 이 인라인 스타일로 생성 — 여긴 배치만) */
  #panel { flex: 0 0 280px; display: none; }
  #panel.on { display: block; }
  #recBtn.on { background: #e2647e; }
  @media (max-width: 620px) {
    main { padding: 12px 0 32px; }
    #panel { flex: 1 1 100%; max-width: 560px; }
  }
  #stage3d { background: #0d0d12; cursor: grab; }
  #stage2d { background: #fff; }
  .warp-shake { position: absolute; inset: 0; will-change: transform; }
  .warp-shake canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #gl { z-index: 0; } #cv { z-index: 1; }
  #cv3d { width: 100%; height: 100%; display: block; }
  .row { display: flex; gap: 8px; margin-top: 14px; align-items: center; flex-wrap: wrap; }
  button { padding: 11px 16px; border-radius: 10px; border: 0; background: #5b8cff; color: #fff; font-size: .95rem; font-weight: 600; cursor: pointer; }
  button.alt { background: #2a2a35; }
  #mirrorBtn.on { background: #e2647e; }
  select { padding: 10px; border-radius: 10px; background: #0d0d12; color: inherit; border: 1px solid #2a2a35; font-size: .95rem; }
  a.link { color: #9a9ab0; font-size: .88rem; text-decoration: none; margin-left: auto; }
  #status { margin-top: 12px; color: #9a9ab0; font-size: .9rem; min-height: 1.2em; }
  #status.error { color: #ff7a7a; }
  footer { margin-top: 22px; font-size: .78rem; color: #66667a; line-height: 1.6; }
  footer a { color: #8a8aff; }
</style>
<script type="importmap">{ "imports": { "three": "./vendor/three.module.js" } }</script>
</head>
<body>
<main>
  <h1>🪞 DrawFace Live — 웹캠 표정 미러링</h1>

  <div class="duo">
    <div class="stage" id="stage3d"><canvas id="cv3d"></canvas></div>
    <div class="stage" id="stage2d" style="display:none"><div class="warp-shake" id="shake">
      <canvas id="gl" width="512" height="512"></canvas>
      <canvas id="cv" width="512" height="512"></canvas>
    </div></div>
    <div id="panel"></div>
  </div>

  <div class="row">
    <button id="mirrorBtn">🪞 미러링 시작</button>
    <button class="alt" id="panelBtn">📊 분석</button>
    <button class="alt" id="recBtn" title="캐릭터 캔버스만 WebM 영상으로 저장">⏺ 녹화</button>
    <select id="charSel">
      <option value="mark">🗿 석고상 남성 (NVIDIA mark · 3D)</option>
      <option value="claire">🗿 석고상 여성 (NVIDIA claire · 3D)</option>
      <option value="rpmA">🧑 아바타 A (Ready Player Me · 3D)</option>
      <option value="rpmB">🧑 아바타 B (Ready Player Me · 3D)</option>
      <option value="boy">🎨 소년 (그래픽 · 2D)</option>
      <option value="girl">🎨 소녀 (그래픽 · 2D)</option>
    </select>
    <label style="display:flex;align-items:center;gap:6px;font-size:.9rem;color:#9a9ab0;cursor:pointer">
      <input type="checkbox" id="headMove"> 머리 움직임
    </label>
    <a class="link" href="combo.html" style="margin-left:auto">🎬 5인 동시</a>
    <a class="link" href="draw.html" style="margin-left:12px">✏️ 내 손그림 →</a>
  </div>

  <div id="status">모델 로딩 중…</div>

  <footer>
    전부 브라우저 안에서 처리 — 영상은 어디로도 전송되지 않습니다.
    초상화·실사급 일러스트는 로컬 GPU 트랙(LivePortrait 30fps) —
    <a href="https://github.com/ingon1026/drawface-live#일러스트-트랙--liveportrait-실시간-2026-07-23-재실측">실측 결과</a>.
    mark·claire 헤드 © NVIDIA, <a href="assets3d/LICENSE-mark.txt">MIT (Maya-ACE)</a> 파생.
    말하는 아바타는 <a href="https://ingon1026.github.io/talking-drawing-avatar/">talking-drawing-avatar</a>.
  </footer>
</main>

<script src="avatar_core.js"></script>
<script type="module">
let THREE, GLTFLoader, MeshoptDecoder;
try {
  THREE = await import("three");
  // GLTFLoader·meshopt 디코더는 CDN(jsDelivr, three r160 동일 버전) 우선 — Pages 신규 경로의
  // 엣지 404 캐시를 회피한다(MediaPipe 도 같은 CDN 으로 로드 중이라 도달성 검증됨). 실패 시 로컬 폴백.
  try {
    ({ GLTFLoader } = await import("https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js"));
  } catch {
    ({ GLTFLoader } = await import("./vendor/GLTFLoader.js?v=2"));
  }
  // mark.glb 는 EXT_meshopt_compression (41MB → 1.8MB) — 디코더 필수
  try {
    ({ MeshoptDecoder } = await import("https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/meshopt_decoder.module.js"));
  } catch {
    ({ MeshoptDecoder } = await import("./vendor/meshopt_decoder.module.js"));
  }
} catch (e) {
  // 진짜 원인 추적용: 실패한 리소스의 실제 HTTP 상태를 상태줄에 노출
  let detail = e.message;
  try {
    const r = await fetch("./vendor/GLTFLoader.js?v=2", { cache: "reload" });
    detail += ` (로컬 fetch: HTTP ${r.status})`;
  } catch (fe) { detail += ` (로컬 fetch: ${fe.message})`; }
  document.getElementById("status").textContent = "3D 모듈 로드 실패: " + detail;
  throw e;
}

const $ = id => document.getElementById(id);
const setStatus = AvatarCore.bindStatus($("status"));


// ================= 공유: 미러링 + 깜빡임 =================
let smooth = {};
const W = k => smooth[k] || 0;
const blinker = AvatarCore.makeBlink({ autoBlink: () => true, intervalMs: () => 3800, duration: 145, jitter: 0.7 });
const mirror = AvatarCore.makeMirror({ onStatus: setStatus });
$("mirrorBtn").onclick = () => {
  if (mirror.on) {
    mirror.stop(); $("mirrorBtn").classList.remove("on"); $("mirrorBtn").textContent = "🪞 미러링 시작";
    scheduleDemo(3000);   // 미러링 끝나면 유휴 시연 재개
    return;
  }
  showcase.stop(); clearTimeout(demoTimer);   // 직접 조종 시작 — 시연 즉시 중단
  mirror.start().then(() => { $("mirrorBtn").classList.add("on"); $("mirrorBtn").textContent = "⏹ 미러링 종료"; panel.classList.add("on"); })
    .catch(e => { mirror.stop(); $("mirrorBtn").classList.remove("on"); setStatus("미러링 실패: " + e.message, true); });
};

// ================= 자동 쇼케이스: 카메라 허용 전에도 살아있는 데모 =================
// 포즈(채널값) 시퀀스를 EMA 로 부드럽게 수렴시켜 시연 — 시퀀서는 코어 makeShowcase 재사용.
// 3D/2D 렌더러가 같은 채널을 소비하므로 석고상·소년 모두 자동 적용. 미러링 중엔 완전히 꺼짐.
const POSES = [
  { mouthsmileleft: .9, mouthsmileright: .9, eyesquintleft: .4, eyesquintright: .4 },  // 활짝 미소
  { jawopen: .75 },                                                                    // 아
  { mouthpucker: .95, mouthfunnel: .4, jawopen: .12 },                                 // 우 (오므림)
  { jawopen: .45, browinnerup: 1, eyewideleft: .7, eyewideright: .7 },                 // 놀람
  { eyeblinkleft: 1, mouthsmileleft: .6, mouthsmileright: .3 },                        // 윙크
  { eyelookoutleft: .9, eyelookinright: .9 },                                          // 시선 왼쪽
  { eyelookoutright: .9, eyelookinleft: .9 },                                          // 시선 오른쪽
];
let demoTarget = null, demoTimer = null;
const demoW = {};
const showcase = AvatarCore.makeShowcase(pose => new Promise(res => {
  demoTarget = pose;
  setTimeout(() => { demoTarget = null; setTimeout(res, 320); }, 1300);
}), POSES);
function scheduleDemo(delay) {
  clearTimeout(demoTimer);
  demoTimer = setTimeout(() => {
    if (mirror.on || showcase.running) return;
    setStatus("🎬 자동 시연 중 — 🪞 미러링 시작을 누르면 직접 조종할 수 있어요");
    showcase.play().then(() => {
      if (!mirror.on) { setStatus("🪞 미러링 시작을 누르고 카메라를 허용해주세요"); scheduleDemo(5000); }
    });
  }, delay);
}
function demoApply() {
  if (mirror.on) { for (const k in demoW) delete demoW[k]; return; }
  for (const k in demoW) if (!demoTarget || !(k in demoTarget)) demoW[k] *= 0.85;   // 지난 포즈 채널 감쇠
  if (demoTarget) for (const k in demoTarget) demoW[k] = 0.85 * (demoW[k] || 0) + 0.15 * demoTarget[k];
  for (const k in demoW) {
    if (demoW[k] < 0.01) delete demoW[k];
    else smooth[k] = Math.max(smooth[k] || 0, demoW[k]);
  }
}
scheduleDemo(2200);   // 첫 진입 — 모델 로드될 즈음 시연 시작

// ================= 분석 패널 (코어 makeMirrorPanel — face 페이지들과 공용) =================
const panel = $("panel");
const mpanel = AvatarCore.makeMirrorPanel(mirror, panel);
$("panelBtn").onclick = () => panel.classList.toggle("on");

// ================= 녹화: 캐릭터 캔버스만 WebM 저장 (draw.html 과 같은 방식) =================
// 3D 는 cv3d 직접, 2D 는 gl+cv 두 레이어라 오프스크린 합성 캔버스를 매 프레임 채워 녹화.
let recorder = null, recCv = null;
function stopRec() {
  if (recorder && recorder.state !== "inactive") recorder.stop();
}
$("recBtn").onclick = () => {
  if (recorder) { stopRec(); return; }
  const mime = ["video/webm;codecs=vp9", "video/webm"].find(t => window.MediaRecorder && MediaRecorder.isTypeSupported(t));
  if (!mime) { setStatus("이 브라우저는 WebM 녹화를 지원하지 않습니다", true); return; }
  let stream;
  if (is3D()) stream = canvas3d.captureStream(30);   // mark·claire 둘 다 canvas3d 에 렌더
  else {
    recCv = document.createElement("canvas");
    recCv.width = 512; recCv.height = 512;
    stream = recCv.captureStream(30);
  }
  const chunks = [];
  recorder = new MediaRecorder(stream, { mimeType: mime });
  recorder.ondataavailable = e => e.data.size && chunks.push(e.data);
  recorder.onstop = () => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob(chunks, { type: "video/webm" }));
    a.download = "drawface-live.webm";
    a.click();
    URL.revokeObjectURL(a.href);
    recorder = null; recCv = null;
    $("recBtn").classList.remove("on"); $("recBtn").textContent = "⏺ 녹화";
    setStatus("녹화 완료 — WebM 다운로드를 시작했습니다");
  };
  recorder.start();
  $("recBtn").classList.add("on"); $("recBtn").textContent = "⏹ 녹화 종료";
  setStatus("녹화 중 — 캐릭터 캔버스만 저장됩니다 (웹캠 화면은 포함 안 됨)");
};

// ================= 3D: 석고상 (mark) =================
const canvas3d = $("cv3d");
const renderer = new THREE.WebGLRenderer({ canvas: canvas3d, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d12);
const camera = new THREE.PerspectiveCamera(28, 1, 0.1, 1000);
scene.add(new THREE.HemisphereLight(0xdfe6ff, 0x2a2018, 1.1));
const key = new THREE.DirectionalLight(0xffffff, 2.2); key.position.set(1.5, 2, 3); scene.add(key);
const rim = new THREE.DirectionalLight(0x77aaff, 1.0); rim.position.set(-2, 1, -2); scene.add(rim);
const group = new THREE.Group();
scene.add(group);
let mesh = null, eyes3d = [], morphMap = [];

// 눈알(안구 메시가 없는 헤드의 소켓 채움) — 위치·크기를 헤드 bbox 에서 유도해 mark/claire 공용.
// mark 로 보정한 bbox 분율: 눈은 중심에서 (±0.111·sx, +0.151·sy, +0.284·sz), 스케일 sy/41.5.
function makeEye(sign, box) {
  const c = box.getCenter(new THREE.Vector3()), s = box.getSize(new THREE.Vector3());
  const k = s.y / 41.5;   // mark 기준 스케일
  const eg = new THREE.Group();
  eg.position.set(c.x + sign * 0.111 * s.x, c.y + 0.151 * s.y, c.z + 0.284 * s.z);
  const mat = (color, roughness) => new THREE.MeshStandardMaterial({ color, roughness });
  const sclera = new THREE.Mesh(new THREE.SphereGeometry(1.15 * k, 32, 16), mat(0xf2f0ee, 0.35));
  const iris = new THREE.Mesh(new THREE.SphereGeometry(0.46 * k, 24, 12), mat(0x44546e, 0.3));
  iris.position.z = 0.78 * k;
  const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.2 * k, 16, 8), mat(0x0c0c0c, 0.4));
  pupil.position.z = 1.0 * k;
  eg.add(sclera, iris, pupil);
  group.add(eg);
  return eg;
}

const gltfLoader = new GLTFLoader();
gltfLoader.setMeshoptDecoder(MeshoptDecoder);
// 3D 헤드 정의 — 전부 ARKit 52 모프타깃이라 구동 코드는 공용, 개별 차이만 여기 선언.
//  석고(mark·claire): 우리 리포 자산, 머리만 있고 안구 메시가 없어 눈알 구체를 넣는다.
//  RPM: Ready Player Me CDN 에서 런타임 로드(리포에 재배포하지 않음 — 원 제공자 CDN 이 정식 사용법).
//       반신이라 상단 일부만 머리로 잡아 프레이밍하고, 눈·머리카락·옷이 이미 있어 구체 불필요
//       (시선도 eyeLook 모프로 직접 돌아간다).
const RPM_Q = "?morphTargets=ARKit&textureAtlas=1024";
const HEADS = {
  mark:   { url: "assets3d/mark.glb?v=3",   label: "석고상 남성", eyeSpheres: true,  headFrac: 1 },
  claire: { url: "assets3d/claire.glb?v=3", label: "석고상 여성", eyeSpheres: true,  headFrac: 1 },
  rpmA:   { url: "https://models.readyplayer.me/64bfa15f0e72c63d7c3934a6.glb" + RPM_Q, label: "RPM 아바타 A", eyeSpheres: false, headFrac: 0.22 },
  rpmB:   { url: "https://models.readyplayer.me/622952275de1ae64c9ebe969.glb" + RPM_Q, label: "RPM 아바타 B", eyeSpheres: false, headFrac: 0.22 },
};
const glbCache = {};
let sceneNode = null, loaded3D = null;   // 현재 화면에 올라간 3D 헤드(로드 실패 시 되돌리기용)
function load3D(name) {
  const cfg = HEADS[name];
  const done = g => {
    if (sceneNode) group.remove(sceneNode);
    eyes3d.forEach(e => group.remove(e)); eyes3d = [];
    group.position.set(0, 0, 0);
    group.updateMatrixWorld(true);                   // .position 변경을 matrixWorld 에 즉시 반영 —
                                                     // 안 하면 setFromObject 가 이전 헤드 오프셋을 물어 bbox 가 어긋남
    sceneNode = g.scene;
    mesh = null;
    // 모프타깃을 가진 메시를 고른다 (RPM 은 헤드 외 메시가 섞여 있을 수 있음)
    sceneNode.traverse(o => { if (o.isMesh && o.morphTargetInfluences) { mesh = o; o.frustumCulled = false; } });
    if (!mesh) { setStatus(cfg.label + ": 표정 모프타깃이 없는 모델입니다", true); return; }
    morphMap = Object.entries(mesh.morphTargetDictionary || {}).map(([n, i]) => [AvatarCore.norm(n), i]);
    group.add(sceneNode);
    const box = new THREE.Box3().setFromObject(sceneNode);
    const c = box.getCenter(new THREE.Vector3()), s = box.getSize(new THREE.Vector3());
    if (cfg.eyeSpheres) eyes3d = [makeEye(1, box), makeEye(-1, box)];   // 눈은 head 로컬 bbox 로 배치 후
    // 프레이밍: 석고는 전체가 머리 / RPM 은 반신이라 상단 headFrac 만큼을 머리로 보고 맞춘다
    const headH = s.y * cfg.headFrac;
    const focusY = cfg.headFrac === 1 ? c.y : box.max.y - headH * 0.42;
    group.position.set(-c.x, -focusY, -c.z);         // 헤드·눈 함께 recenter
    camera.position.set(0, 0, headH * 2.0); camera.lookAt(0, 0, 0);
    camera.near = headH / 100; camera.far = headH * 100; camera.updateProjectionMatrix();
    setStatus("🪞 미러링 시작을 누르고 카메라를 허용해주세요");
  };
  if (glbCache[name]) return done(glbCache[name]);
  setStatus(cfg.label + " 불러오는 중…");
  const prev = loaded3D;
  gltfLoader.load(cfg.url, g => { glbCache[name] = g; loaded3D = name; done(g); },
    undefined, () => {
      // 실패 시 화면엔 이전 헤드가 남으므로 드롭다운도 되돌려 UI 와 화면을 일치시킨다
      setStatus(cfg.label + " 를 불러오지 못했습니다 — 네트워크를 확인해주세요", true);
      if (prev) $("charSel").value = prev;
    });
}
// 초기 로드는 캐릭터 선택부에서 현재 selection 으로 한 번만 (mark/claire 이중로드 경쟁 방지)

function resize3d() {
  const r = canvas3d.parentElement.getBoundingClientRect();
  renderer.setSize(r.width, r.height, false);
  camera.aspect = 1; camera.updateProjectionMatrix();
}
new ResizeObserver(resize3d).observe(canvas3d.parentElement);

let dragging = false, px = 0, py = 0, userYaw = 0, userPitch = 0, nod = 0;
canvas3d.addEventListener("pointerdown", e => { dragging = true; px = e.clientX; py = e.clientY; });
addEventListener("pointerup", () => dragging = false);
addEventListener("pointermove", e => {
  if (!dragging) return;
  userYaw += (e.clientX - px) * 0.005; userPitch += (e.clientY - py) * 0.003;
  userPitch = Math.max(-0.4, Math.min(0.4, userPitch));
  px = e.clientX; py = e.clientY;
});
const gaze3d = AvatarCore.makeGaze(AvatarCore.makeCursorTracker(canvas3d), { mulX: 0.8, mulY: 0.5 });

// ================= 2D: 소년·소녀 (벡터 입 + WebGL 워프 + 동공) =================
// 파츠 출처: talking-drawing-avatar 기본 캐릭터 규격 (base·눈썹·눈 뜸/감음·동공, 입은 벡터)
const cv = $("cv"), ctx2d = cv.getContext("2d");
const glCanvas = $("gl"), shakeEl = $("shake");
const VECTOR_PARTS = ["base", "brow_L", "brow_R", "eye_L_open", "eye_R_open",
  "eye_L_closed", "eye_R_closed", "pupil_L", "pupil_R"];
let parts = {}, manifest = null;
const charCache = {};
const gaze2d = AvatarCore.makeGaze(AvatarCore.makeCursorTracker($("stage2d")), { mulX: 0.9, mulY: 0.6 });
const headWander = AvatarCore.makeHeadWander();
const warp = AvatarCore.makeWarp({
  threeUrl: "./vendor/three.module.js", glCanvas,
  getParts: () => parts, getManifest: () => manifest, W,
});

async function loadChar(name) {
  if (!charCache[name]) {
    const m = await fetch(`characters/${name}/manifest.json`).then(r => r.json());
    const ps = {};
    await Promise.all(VECTOR_PARTS.map(f => new Promise(res => {
      const img = new Image();
      img.onload = () => { ps[f] = img; res(); };
      img.onerror = () => res();
      img.src = `characters/${name}/${f}.png`;
    })));
    charCache[name] = { parts: ps, manifest: m };
  }
  ({ parts, manifest } = charCache[name]);
  warp.setCharacter();
}

// ================= 캐릭터 선택 =================
// select 값이 단일 진실 — mark·claire=3D 헤드 / boy·girl=2D 그래픽
const mode = () => $("charSel").value;
const is3D = () => mode() in HEADS;   // HEADS 에 선언된 것이 3D 헤드 (석고 2종 + RPM 2종)
$("charSel").onchange = () => {
  stopRec();   // 녹화 스트림은 모드별 캔버스에 물려 있어 전환 시 종료
  $("stage3d").style.display = is3D() ? "" : "none";
  $("stage2d").style.display = is3D() ? "none" : "";
  if (is3D()) load3D(mode());
  else loadChar(mode()).catch(e => setStatus("캐릭터 로드 실패: " + e.message, true));
};
// 딥링크: ?char=mark|claire|boy|girl 로 진입 (draw.html·boy.html 이 사용)
const deep = new URLSearchParams(location.search).get("char");
if (deep && [...$("charSel").options].some(o => o.value === deep)) $("charSel").value = deep;
$("charSel").onchange();   // 현재 selection 을 한 번 로드 (기본 mark 또는 딥링크)

// ================= 렌더 루프 (활성 캐릭터만 그림) =================
// 머리 회전 부호 — 실사용에서 뒤집혀 보이면 여기만 바꾼다 (?hs=y,p,r 로 즉석 실험 가능)
const hsQ = new URLSearchParams(location.search).get("hs");
const hsv = hsQ ? hsQ.split(",").map(Number) : [1, 1, 1];
const SIGN = { y: hsv[0] || 1, p: hsv[1] || 1, r: hsv[2] || 1 };
let lastFrame = 0;
function render(now) {
  requestAnimationFrame(render);
  if (now - lastFrame < 30) return;   // ~30fps 캡 — 데이터·녹화 모두 30fps라 고주사율에서 낭비 방지
  lastFrame = now;
  smooth = {};
  demoApply();   // 자동 쇼케이스 (미러링 off 일 때만)
  mirror.apply(smooth, now);
  const blink = Math.max(blinker.value(now), W("eyeblinkleft"), W("eyeblinkright"));
  mpanel.draw(W);   // 비교군 — 캐릭터와 같은 프레임의 채널값

  if (is3D()) {
    if (!mesh) return;
    const inf = mesh.morphTargetInfluences;
    for (const [k, idx] of morphMap) {
      inf[idx] = k === "eyeblinkleft" || k === "eyeblinkright" ? blink : (smooth[k] || 0);
    }
    const [gsx, gsy] = gaze3d(0, W);
    for (const e of eyes3d) e.rotation.set(gsy * 0.3, gsx * 0.4, 0);
    nod = 0.85 * nod + 0.15 * W("jawopen");
    // 머리 회전: 토글 ON 이면 웹캠 머리 자세를 전이, OFF 면 표정만 (기존 동작 유지)
    const h = $("headMove").checked ? mirror.head() : null;
    if (h) group.rotation.set(userPitch + SIGN.p * h[1] + nod * 0.04, userYaw + SIGN.y * h[0], SIGN.r * h[2]);
    else group.rotation.set(userPitch + nod * 0.04, userYaw, 0);
    renderer.render(scene, camera);
    return;
  }

  // 2D 캐릭터
  if (!parts.base || !manifest) return;
  headWander(shakeEl, now, W("jawopen"), 0.5, null);
  const warpOn = warp.ready;   // 워프 로드 전엔 base 폴백
  if (warpOn) { glCanvas.style.visibility = "visible"; warp.render(); }
  else { glCanvas.style.visibility = "hidden"; }
  ctx2d.clearRect(0, 0, 512, 512);
  const draw = (n, dyy = 0) => parts[n] && ctx2d.drawImage(parts[n], 0, dyy);
  const drawXY = (n, dx, dyy) => parts[n] && ctx2d.drawImage(parts[n], dx, dyy);
  if (!warpOn) { ctx2d.fillStyle = "#fff"; ctx2d.fillRect(0, 0, 512, 512); draw("base"); }
  const [gzx, gzy] = gaze2d(0, W);

  const browUp = -(manifest.browRange || 0) * Math.min(1, W("browinnerup") + (W("browouterupleft") + W("browouterupright")) / 2)
               + (manifest.browRange || 0) * 0.8 * (W("browdownleft") + W("browdownright")) / 2;
  draw("brow_L", browUp); draw("brow_R", browUp);

  if (blink > 0.5) { draw("eye_L_closed"); draw("eye_R_closed"); }
  else {
    draw("eye_L_open"); draw("eye_R_open");
    const pr = manifest.pupilRange || 0;
    drawXY("pupil_L", gzx * pr, gzy * pr); drawXY("pupil_R", gzx * pr, gzy * pr);
  }
  const jawDy = warp.jawOverlayDy(W("jawopen"), warpOn, manifest);
  AvatarCore.drawVectorMouth(ctx2d, W, manifest, jawDy);

  if (recCv) {   // 2D 녹화 합성 — 두 레이어(gl 워프 + cv 오버레이)
    const c = recCv.getContext("2d");
    c.fillStyle = "#fff"; c.fillRect(0, 0, 512, 512);
    if (warpOn) c.drawImage(glCanvas, 0, 0);
    c.drawImage(cv, 0, 0);
  }
}

warp.init();
loadChar(is3D() ? "boy" : mode()).catch(e => setStatus("캐릭터 로드 실패: " + e.message, true));   // 2D 프리로드(3D 진입 시 boy 워밍, 2D 진입 시 활성 캐릭터 유지)
requestAnimationFrame(render);
</script>
</body>
</html>
